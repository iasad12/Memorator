<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB, WA & SMS Data Explorer - Advanced (v6.0)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --bg-color: #0f1115;
            --panel-bg: #1a1d24;
            --accent-primary: #3b82f6;
            --accent-secondary: #25D366;
            --accent-danger: #ef4444;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #2d3748;
            --success: #10b981;
            --warning: #f59e0b;
            --msg-sent: #2563eb;
            --msg-received: #374151;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            padding: 0.8rem 1.5rem;
            background: rgba(26, 29, 36, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .btn-toggle-sidebar {
            background: transparent; border: none; color: var(--text-main);
            font-size: 1.2rem; cursor: pointer; padding: 4px; border-radius: 4px;
        }
        .btn-toggle-sidebar:hover { background: rgba(255,255,255,0.1); }

        /* --- Layout --- */
        main { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* --- Sidebar --- */
        #sidebar {
            width: 320px; background: var(--panel-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 5; flex-shrink: 0;
            transition: width 0.3s ease; overflow: hidden;
        }
        #sidebar.collapsed { width: 0; border-right: none; }
        
        .sidebar-content { width: 320px; height: 100%; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1rem 1.5rem 0.5rem 1.5rem; }

        .my-name-input {
            width: 100%; background: #00000020; border: 1px solid var(--border-color);
            color: var(--text-main); padding: 8px; border-radius: 4px;
            margin-top: 5px; font-size: 0.85rem; font-family: inherit;
        }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            padding: 0.5rem 1.5rem; margin-bottom: 0.5rem;
        }
        .stat-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }
        .stat-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        /* Upload & Action Zones */
        .upload-row { display: flex; gap: 10px; margin: 0.5rem 1.5rem 0.2rem 1.5rem; }
        .upload-zone {
            flex: 1; border: 2px dashed var(--border-color); border-radius: 8px;
            padding: 0.8rem 0.5rem; text-align: center; cursor: pointer; font-size: 0.85rem; margin: 0;
        }
        .upload-zone:hover { border-color: var(--accent-primary); background: rgba(59, 130, 246, 0.05); }
        .upload-zone input { display: none; }

        .action-row { display: flex; gap: 5px; margin: 0 1.5rem 10px 1.5rem; justify-content: space-between; }
        .btn-action {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
            color: var(--text-muted); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; flex: 1;
        }
        .btn-action:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: white; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        .sidebar-search-wrapper { padding: 0 1.5rem; margin-bottom: 10px; display:flex; flex-direction:column; gap:8px;}
        .sidebar-search-input {
            width: 100%; background: #00000020; border: 1px solid var(--border-color);
            padding: 6px 12px; border-radius: 20px; color: white; font-size: 0.85rem;
        }

        .sidebar-tabs { display: flex; padding: 0 1.5rem; margin-bottom: 10px; gap: 5px; }
        .sidebar-tab {
            flex: 1; text-align: center; padding: 4px 0; font-size: 0.75rem; color: var(--text-muted);
            background: rgba(0,0,0,0.2); border-radius: 4px; cursor: pointer; border: 1px solid transparent;
        }
        .sidebar-tab:hover { background: rgba(255,255,255,0.05); }
        .sidebar-tab.active {
            color: var(--accent-primary); background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-primary); font-weight: bold;
        }

        .contacts-list { flex: 1; overflow-y: auto; padding: 0 0.5rem; }
        .contact-item {
            padding: 0.8rem 1rem; margin-bottom: 4px; border-radius: 6px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent;
        }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: rgba(59, 130, 246, 0.15); border-color: var(--accent-primary); }
        .contact-name { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
        .contact-meta { font-size: 0.75rem; color: var(--text-muted); text-align: right; }
        .badge-sent { color: var(--accent-primary); }
        .badge-recv { color: var(--text-muted); }

        /* --- Main Content --- */
        .content-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); position: relative; }
        .top-bar {
            padding: 0.8rem 2rem; border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg); display: flex; align-items: center; justify-content: space-between;
        }
        .view-title { font-weight: bold; font-size: 1.1rem; }
        .view-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; }

        .search-container { flex: 1; max-width: 400px; margin-left: 2rem; position: relative; }
        .search-input {
            width: 100%; background: #00000020; border: 1px solid var(--border-color);
            padding: 0.5rem 1rem; border-radius: 20px; color: white;
        }

        .export-buttons { display: flex; gap: 10px; }
        .btn {
            background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;
        }
        .btn:hover:not(:disabled) { background: #2d3748; border-color: var(--text-muted); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        
        .btn-danger { color: var(--accent-danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); }
        .btn-danger:hover:not(:disabled) { background: rgba(239, 68, 68, 0.15); border-color: var(--accent-danger); }
        
        .btn-directory { background: rgba(255,255,255,0.05); border: 1px dashed var(--text-muted); width: 100%; }
        .btn-directory:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: white; border-color: white;}
        
        .btn-load-more {
            width: 100%; padding: 10px; margin: 10px 0; background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-primary); color: var(--accent-primary);
            border-radius: 8px; text-align: center; cursor: pointer;
        }
        .btn-load-more:hover { background: rgba(59, 130, 246, 0.2); }

        .chat-tabs { padding: 0.5rem 2rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 1rem; }
        .tab { padding: 5px 10px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); font-weight: bold; }

        .views-container { flex: 1; position: relative; overflow: hidden; }
        .view-section { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; flex-direction: column; }
        .view-section.active { display: flex; }

        /* View 1: Search Results */
        .results-list { flex: 1; overflow-y: auto; padding: 1rem 2rem; }
        .result-item { padding: 1rem; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 0.5rem; cursor: pointer; white-space: pre-wrap; }
        .result-item:hover { border-color: var(--accent-primary); }
        .result-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 1rem; margin-bottom: 0.4rem; }
        .highlight { background: rgba(255, 215, 0, 0.2); padding: 0 2px; border-radius: 2px; }

        /* View 2: Chat View */
        .chat-view { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .chat-bubble { max-width: 60%; padding: 10px 16px; border-radius: 12px; position: relative; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; margin-bottom: 1rem; white-space: pre-wrap; }
        .chat-bubble.sent { align-self: flex-end; background: var(--msg-sent); color: white; border-bottom-right-radius: 2px; }
        .chat-bubble.received { align-self: flex-start; background: var(--msg-received); color: var(--text-main); border-bottom-left-radius: 2px; }
        .bubble-date { display: block; font-size: 0.7rem; margin-top: 4px; opacity: 0.7; text-align: right; }
        .bubble-sender { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 2px; color: var(--accent-secondary); }
        .reaction-container { margin-top: 5px; font-size: 0.85rem; display: flex; gap: 4px; }
        .reaction-badge { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 10px; }

        /* View 3: Media Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; padding: 2rem; overflow-y: auto; }
        .gallery-item { background: var(--panel-bg); border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); cursor: pointer; position: relative; aspect-ratio: 1 / 1; }
        .gallery-item:hover { border-color: var(--accent-primary); }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .file-icon { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 3rem; color: var(--text-muted); }
        .file-name { font-size: 0.8rem; padding: 0.5rem; text-align: center; word-break: break-all; position: absolute; bottom: 0; background: rgba(0,0,0,0.6); color: white; width: 100%; }
        .gallery-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); color: white; padding: 10px; font-size: 0.8rem; display: none; flex-direction: column; justify-content: center; text-align: center; line-height: 1.2; }
        .gallery-item:hover .gallery-overlay { display: flex; }

        /* View 4 & 6: Stats Dashboard */
        .stats-dashboard { padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .stats-row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .stats-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 1.5rem; flex: 1; min-width: 250px; }
        .stats-card h3 { margin-top: 0; color: var(--accent-primary); font-size: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        .stat-detail-row { display: flex; justify-content: space-between; margin-bottom: 0.6rem; font-size: 0.9rem; padding-bottom: 0.4rem; border-bottom: 1px dashed rgba(255,255,255,0.05); }
        .stat-detail-row:last-child { border-bottom: none; }
        .stat-highlight { color: var(--success); font-weight: bold; }
        .stat-slow { color: var(--warning); font-weight: bold; }

        /* View 7: Horizontal Directory Grid */
        .directory-grid {
            display: flex; flex-direction: column; flex-wrap: wrap; gap: 1.2rem;
            padding: 1.5rem; overflow-x: auto; overflow-y: hidden; height: 100%; align-content: flex-start;
        }
        .directory-grid::-webkit-scrollbar { height: 12px; }
        .directory-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 6px; }
        .directory-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 6px; }
        .directory-grid::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .directory-card {
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px;
            padding: 1.2rem; cursor: pointer; transition: transform 0.2s, border-color 0.2s;
            display: flex; flex-direction: column; gap: 8px; width: 280px; flex: 0 0 auto; 
        }
        .directory-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
        .dir-card-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .dir-card-title { font-weight: bold; font-size: 1.1rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .dir-card-badge { font-size: 0.65rem; background: rgba(255,255,255,0.1); padding: 3px 6px; border-radius: 4px; color:var(--text-muted); flex-shrink: 0; }
        .dir-card-stats { font-size: 0.85rem; color: var(--text-muted); display: flex; justify-content: space-between; }

        /* Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        #overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .loader { width: 40px; height: 40px; border: 3px solid #555; border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .log { margin-top: 1rem; color: var(--success); font-family: monospace; font-size: 0.9rem; text-align: center; }

        /* PRINT STYLES */
        @media print {
            body { height: auto; overflow: visible; background: white; color: black; display: block; }
            header, aside, .top-bar, .upload-zone, .chat-tabs, .btn-load-more, .sidebar-tabs, .action-row { display: none !important; }
            main { display: block; overflow: visible; }
            .content-area { display: block; overflow: visible; }
            .views-container { display: block; overflow: visible; }
            .view-section { display: none; position: static; overflow: visible; }
            .view-section.active { display: block; overflow: visible; }
            
            .chat-view { padding: 0; display: block; overflow: visible; }
            .chat-bubble { max-width: 100%; color: black; border: 1px solid #ddd; margin-bottom: 10px; page-break-inside: avoid; background: white; }
            .chat-bubble.sent { background: #f0f0f0; border-left: 5px solid #333; }
            .chat-bubble.received { background: #fafafa; border-left: 5px solid #ccc; }
            .bubble-sender { color: black; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
            .bubble-date { color: #666; }
            
            /* Print Leaderboard cleanly */
            .directory-grid { 
                display: grid !important; 
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)) !important; 
                gap: 10px !important; overflow: visible !important; height: auto !important; padding: 0 !important;
            }
            .directory-card { border: 1px solid #000; break-inside: avoid; margin-bottom: 0; width: 100% !important; background: white !important; color: black !important;}
            .dir-card-title, .dir-card-stats { color: black !important; }
            .dir-card-badge { border: 1px solid #666; color: #333 !important; }
        }

    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>
        <h1>FB, WA & SMS Explorer <span style="font-size:0.8em; opacity:0.6;">v6.0</span></h1>
    </div>
    <button onclick="resetView()" class="btn">Back to List</button>
</header>

<main>
    <aside id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <label style="font-size:0.8rem; color:var(--text-muted); font-weight:bold;">MY PROFILES</label>
                <input type="text" id="my-name-input" class="my-name-input" value="Asad Imran Shah">
                
                <label style="font-size:0.8rem; color:var(--text-muted); font-weight:bold; margin-top:10px; display:block;">EXCLUDE NAMES/CHATS</label>
                <input type="text" id="exclude-input" class="my-name-input" value="Scurvy">
                
                <label style="font-size:0.8rem; color:var(--text-muted); font-weight:bold; margin-top:10px; display:block;" title="Format: Target Name = Alias 1, Alias 2">MERGE CONTACTS (ALIASES)</label>
                <textarea id="alias-input" class="my-name-input" rows="2" placeholder="Target Name = Alias 1, Alias 2&#10;Gul Faraz Khan = Gull Faraz"></textarea>
            </div>

            <div style="padding: 0 1.5rem; margin-top: 5px; font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">LOAD DATA</div>
            <div style="padding: 0 1.5rem; font-size: 0.65rem; color: #888;">Supports HTML, JSON, WhatsApp TXT & SMS NDJSON</div>
            <div class="upload-row">
                <label class="upload-zone">
                    <input type="file" id="folder-input" webkitdirectory directory multiple>
                    <strong>📂 Folder</strong>
                </label>
                <label class="upload-zone">
                    <input type="file" id="file-input" accept=".html,.json,.txt,.ndjson" multiple>
                    <strong>📄 File(s)</strong>
                </label>
            </div>
            
            <div class="action-row">
                <button id="btn-undo" class="btn-action" onclick="performUndo()" disabled>↶ Undo</button>
                <button id="btn-redo" class="btn-action" onclick="performRedo()" disabled>↷ Redo</button>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-val" id="stat-total-msg">0</span>
                    <span class="stat-lbl">Total Msgs</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="stat-chats">0</span>
                    <span class="stat-lbl">Chats</span>
                </div>
            </div>

            <div class="sidebar-search-wrapper">
                <button id="btn-directory" class="btn btn-directory" onclick="openDirectory()" disabled>🗂️ View Chat Directory</button>
                <input type="text" id="contact-filter" class="sidebar-search-input" placeholder="Filter contacts..." disabled>
            </div>

            <div class="sidebar-tabs">
                <div class="sidebar-tab active" data-filter="all">All</div>
                <div class="sidebar-tab" data-filter="direct">Direct</div>
                <div class="sidebar-tab" data-filter="group">Groups</div>
            </div>
            
            <div class="contacts-list" id="contacts-list">
                <div style="padding:1rem; text-align:center; color:gray; font-size:0.8rem;">No data loaded</div>
            </div>

            <div style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px;">
                <div style="display:flex; gap:5px;">
                    <button class="btn" style="flex:1; font-size:0.75rem;" onclick="saveStateToDB()">💾 Save State</button>
                    <button class="btn" style="flex:1; font-size:0.75rem;" onclick="loadStateFromDB()">📂 Load State</button>
                </div>
                <button class="btn btn-danger" style="width:100%; font-size:0.75rem;" onclick="clearAllData()">🗑️ Clear Records</button>
            </div>
        </div>
    </aside>

    <div class="content-area">
        <div class="top-bar">
            <div style="display:flex; flex-direction:column;">
                <div class="view-title" id="active-view-title">Search / Browse</div>
                <div class="view-subtitle" id="active-view-subtitle"></div>
            </div>
            
            <div class="search-container">
                <input type="text" id="global-search" class="search-input" placeholder="Search messages..." disabled>
            </div>
            
            <div class="export-buttons" id="export-actions" style="display:none;">
                </div>
        </div>

        <div class="chat-tabs" id="chat-tabs" style="display:none;">
            <div class="tab active" onclick="switchChatTab('messages')">Messages</div>
            <div class="tab" onclick="switchChatTab('media')">Media / Files</div>
            <div class="tab" onclick="switchChatTab('stats')">Insights & Stats</div>
        </div>

        <div class="views-container">
            
            <div id="view-search" class="view-section active">
                <div class="results-list" id="results-list">
                    <div style="text-align:center; margin-top:50px; color:gray;">Load folder or files to begin.</div>
                </div>
            </div>

            <div id="view-chat" class="view-section">
                <button id="chat-load-more" class="btn-load-more" style="display:none;" onclick="loadMoreChat()">Load Older Messages</button>
                <div class="chat-view" id="chat-container">
                    </div>
            </div>

            <div id="view-chat-media" class="view-section">
                <div class="gallery-grid" id="chat-gallery">
                    </div>
                <button id="chat-media-load-more" class="btn-load-more" style="display:none; width: calc(100% - 4rem);" onclick="loadMoreMedia('chat')">Load More</button>
            </div>

            <div id="view-chat-stats" class="view-section">
                <div class="stats-dashboard" id="chat-stats-container">
                    </div>
            </div>

            <div id="view-global-media" class="view-section">
                <div class="gallery-grid" id="global-gallery">
                    </div>
                <button id="global-media-load-more" class="btn-load-more" style="display:none; width: calc(100% - 4rem);" onclick="loadMoreMedia('global')">Load More</button>
            </div>

            <div id="view-global-stats" class="view-section">
                <div class="stats-dashboard" id="global-stats-container">
                    </div>
            </div>
            
            <div id="view-directory" class="view-section">
                <div class="directory-grid" id="directory-container">
                    </div>
            </div>

        </div>
    </div>
</main>

<div id="overlay" class="hidden">
    <div class="loader"></div>
    <div class="log" id="console-log">Initializing...</div>
</div>

<script>
    // --- State & History ---
    let state = {
        messages: [],
        messageHashes: new Set(),
        chats: {},
        media: [],
        mediaHashes: new Set(),
        myNames: [],
        excludeNames: [],
        aliasMap: {},
        fileRegistry: {},
        sidebarFilter: 'all', 
        chatLimit: 50,
        mediaLimit: 50,
        activeChatName: null
    };

    let undoStack = [];

    // --- IndexedDB Setup ---
    const DB_NAME = "ChatExplorerDB";
    const STORE_NAME = "appState";
    
    function getDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = e => resolve(e.target.result);
            request.onerror = e => reject("DB Error");
        });
    }

    async function saveStateToDB() {
        overlay.classList.remove('hidden');
        log.textContent = "Saving to Local Storage...";
        try {
            const db = await getDB();
            const tx = db.transaction(STORE_NAME, "readwrite");
            const snapshot = {
                messages: state.messages,
                media: state.media,
                myNamesRaw: myNameInput.value,
                excludeRaw: excludeInput.value,
                aliasRaw: aliasInput.value
            };
            tx.objectStore(STORE_NAME).put(snapshot, "latest");
            tx.oncomplete = () => { log.textContent = "Saved Successfully!"; setTimeout(() => overlay.classList.add('hidden'), 500); };
        } catch (e) {
            alert("Error saving state to database.");
            overlay.classList.add('hidden');
        }
    }

    async function loadStateFromDB() {
        overlay.classList.remove('hidden');
        log.textContent = "Loading from Local Storage...";
        try {
            const db = await getDB();
            const tx = db.transaction(STORE_NAME, "readonly");
            const req = tx.objectStore(STORE_NAME).get("latest");
            req.onsuccess = () => {
                if(req.result) {
                    saveToUndoStack();
                    state.messages = req.result.messages || [];
                    state.media = req.result.media || [];
                    myNameInput.value = req.result.myNamesRaw || "";
                    excludeInput.value = req.result.excludeRaw || "";
                    aliasInput.value = req.result.aliasRaw || "";
                    handleConfigChange();
                    rebuildHashes();
                    log.textContent = "Loaded Successfully!";
                } else {
                    alert("No saved state found.");
                }
                setTimeout(() => overlay.classList.add('hidden'), 500);
            };

    }

    // --- Undo / Redo Engine ---
    function saveToUndoStack() {
        undoStack.push({
            messages: [...state.messages],
            media: [...state.media],
            hashes: Array.from(state.messageHashes),
            mHashes: Array.from(state.mediaHashes)
        });
        redoStack = [];
        updateUndoRedoUI();
    }

    function performUndo() {
        if (undoStack.length === 0) return;
        redoStack.push({
            messages: [...state.messages],
            media: [...state.media],
            hashes: Array.from(state.messageHashes),
            mHashes: Array.from(state.mediaHashes)
        });
        const prev = undoStack.pop();
        restoreSnapshot(prev);
    }

    function performRedo() {
        if (redoStack.length === 0) return;
        undoStack.push({
            messages: [...state.messages],
            media: [...state.media],
            hashes: Array.from(state.messageHashes),
            mHashes: Array.from(state.mediaHashes)
        });
        const next = redoStack.pop();
        restoreSnapshot(next);
    }

    function restoreSnapshot(snap) {
        state.messages = snap.messages;
        state.media = snap.media;
        state.messageHashes = new Set(snap.hashes);
        state.mediaHashes = new Set(snap.mHashes);
        updateUndoRedoUI();
        recalculateStats();
        resetView();
    }

    function updateUndoRedoUI() {
        btnUndo.disabled = undoStack.length === 0;
        btnRedo.disabled = redoStack.length === 0;
    }

    function rebuildHashes() {
        state.messageHashes.clear();
        state.mediaHashes.clear();
        state.messages.forEach(m => state.messageHashes.add(`${m.threadName}_${m.sender}_${m.timestamp}_${m.content}`));
        state.media.forEach(m => state.mediaHashes.add(`${m.threadName}_${m.sender}_${m.dateStr}_${m.filename}`));
    }

        state.media = state.media.filter(m => getMappedName(m.threadName) !== targetName);

        recalculateStats();
        resetView();
    }

    function parseInputList(str) {
        const items = []; let current = ''; let inQuotes = false;
        for (let i = 0; i < str.length; i++) {
            const char = str[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { if (current.trim()) items.push(current.trim()); current = ''; } 
            else current += char;
        }
        if (current.trim()) items.push(current.trim());
        return items;
    }

    function updateAliasMap() {
        state.aliasMap = {};
        const lines = aliasInput.value.split('\n');
        lines.forEach(line => {
            if (line.includes('=')) {
                const parts = line.split('=');
                const target = parts[0].trim();
                if (target) {
                    parseInputList(parts[1]).map(a => a.toLowerCase()).forEach(a => { if (a) state.aliasMap[a] = target; });
                }
            }
        });
    }

    function getMappedName(name) { return !name ? "Unknown" : (state.aliasMap[name.toLowerCase()] || name); }

    function isExcluded(threadName, senderName) {
        if (state.excludeNames.length === 0) return false;
        const tLower = (threadName || "").toLowerCase(); const sLower = (senderName || "").toLowerCase();
        return state.excludeNames.some(ex => tLower.includes(ex) || sLower.includes(ex));
    }

    function cleanThreadName(rawName, participants = []) {
        let name = rawName || "";
        if (name && name.includes(',')) {
            let parts = name.split(',').map(s => s.trim()).filter(p => !state.myNames.some(m => m.toLowerCase() === p.toLowerCase()));
            if (parts.length > 0) name = parts.join(', '); else name = ""; 
        }
        if (!name || name === "Unknown Chat" || name.match(/_\d+$/) || name.toLowerCase() === 'unknown') {
            if (participants.length > 0) {
                const others = participants.filter(p => {
                    const pLow = p.toLowerCase();
                    return !state.myNames.some(m => m.toLowerCase() === pLow) && pLow !== "you";
                });
                if (others.length > 0) name = others.join(', ');
            }
        }
        return name || "Unknown Chat";
    }

    function addMessage(msg) {
        const hash = `${msg.threadName}_${msg.sender}_${msg.timestamp}_${msg.content}`;

            state.messageHashes.add(hash);
            state.messages.push(msg);
        }
    }

    // Time utilities
    function parseTimestamp(dateStr) {
        if (!dateStr) return 0;
        let clean = dateStr.replace(/in the mornin'/gi, 'AM').replace(/in the evenin'/gi, 'PM');
        let d = new Date(clean);
        if (!isNaN(d.getTime())) return d.getTime();
        
        const match = clean.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})[, ]+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*([AaPp][Mm])?/);
        if (match) {
            let [_, p1, p2, yr, hr, min, sec, ampm] = match;
            if (yr.length === 2) yr = '20' + yr;
            let m = parseInt(p2) - 1; let day = parseInt(p1);
            if (parseInt(p1) <= 12 && parseInt(p2) > 12) { m = parseInt(p1) - 1; day = parseInt(p2); }
            hr = parseInt(hr);
            if (ampm) { if (ampm.toLowerCase() === 'pm' && hr < 12) hr += 12; if (ampm.toLowerCase() === 'am' && hr === 12) hr = 0; }
            return new Date(parseInt(yr), m, day, hr, parseInt(min), sec ? parseInt(sec) : 0).getTime();
        }
        return 0;
    }

    function formatDuration(ms) {
        if (ms === 0 || ms === Infinity) return "N/A";
        if (ms < 1000) return "< 1s";
        let sec = Math.floor(ms / 1000); if (sec < 60) return `${sec}s`;
        let min = Math.floor(sec / 60); if (min < 60) return `${min}m ${sec % 60}s`;
        let hr = Math.floor(min / 60); if (hr < 24) return `${hr}h ${min % 60}m`;
        let d = Math.floor(hr / 24); return `${d}d ${hr % 24}h`;
    }

    // --- Core Upload Logic ---
    async function handleUpload(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        saveToUndoStack();

        files.forEach(f => {
            const pathKey = f.webkitRelativePath || f.name;
            state.fileRegistry[pathKey] = f;
        });

        const dataFiles = files.filter(f => (f.name.endsWith('.html') || f.name.endsWith('.json') || f.name.endsWith('.txt') || f.name.endsWith('.ndjson')) && f.size > 0);

        if (dataFiles.length === 0) {
            alert("No data files found."); e.target.value = ''; return;
        }

        let currentBatchProcessed = 0; const currentBatchTotal = dataFiles.length;
        state.chatLimit = 50; state.mediaLimit = 50;

        overlay.classList.remove('hidden');
        globalSearch.disabled = true; contactFilter.disabled = true;
        btnDirectory.disabled = true;
        log.textContent = "Initializing new batch...";

        const CHUNK = 20; 
        for (let i = 0; i < dataFiles.length; i += CHUNK) {
            const chunk = dataFiles.slice(i, i + CHUNK);
            for (const file of chunk) {
                try {
                    const text = await file.text();
                    if (file.name.endsWith('.ndjson')) parseNDJSON(text, file.name);
                    else if (file.name.endsWith('.json')) parseJSON(text, file.webkitRelativePath);
                    else if (file.name.endsWith('.txt')) parseWhatsAppTXT(text, file.name);
                    else parseHTML(text, file.webkitRelativePath);
                } catch (err) { console.error(err); }
                currentBatchProcessed++;
                log.textContent = `Scanned ${currentBatchProcessed} / ${currentBatchTotal} files...`;
            }
            await new Promise(r => setTimeout(r, 0));
        }

        handleConfigChange(); 
        
        overlay.classList.add('hidden');
        globalSearch.disabled = false; contactFilter.disabled = false;
        btnDirectory.disabled = false;
        
        switchView('search'); renderResults(state.messages.slice(0, 50));
        e.target.value = '';
    }

    // --- Content Parsers ---
    function parseNDJSON(text, filename) {
        const lines = text.split(/\r?\n/);
        lines.forEach(line => {
            if (!line.trim()) return;
            try {
                const data = JSON.parse(line);
                let rawThreadName = data.__display_name || data.address || "Unknown SMS";
                let threadName = cleanThreadName(rawThreadName);
                
                let sender = "Unknown";
                if (data.type === "2") {
                    sender = state.myNames.length > 0 ? state.myNames[0] : "Me";
                } else {
                    sender = data.__display_name || data.address || "Unknown";
                }
                
                let content = data.body || "";
                let timestamp = data.date ? parseInt(data.date) : 0;
                let dateStr = timestamp ? new Date(timestamp).toLocaleString() : "";
                
                if (content) {
                    addMessage({
                        threadName: threadName,
                        sender: sender,
                        content: content,
                        dateStr: dateStr,
                        timestamp: timestamp,
                        reactions: []
                    });
                }
            } catch (e) {}
        });
    }

    function parseWhatsAppTXT(text, filename) {
        let rawName = filename.replace('.txt', '').replace(/^WhatsApp Chat with /i, '').trim();
        let threadName = cleanThreadName(rawName);
        const lines = text.split(/\r?\n/);
        const messageRegex = /^\[?(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}[, ]+\d{1,2}:\d{2}(?::\d{2})?(?:\s*[AaPp][Mm])?)\]?\s*[\-]?\s*([^:]+):\s*(.*)$/;
        let currentMsg = null;

        lines.forEach(line => {
            const match = line.match(messageRegex);
            if (match) {
                const sender = match[2].trim();
                if (currentMsg) addMessage(currentMsg);
                const dateStr = match[1].trim();
                currentMsg = { threadName: threadName, sender: sender, dateStr: dateStr, timestamp: parseTimestamp(dateStr), content: match[3].trim(), reactions: [] };
            } else {
                if (currentMsg && line.trim() !== "") currentMsg.content += "\n" + line.trim();
            }
        });
        if (currentMsg) addMessage(currentMsg);
    }

    function parseHTML(html, filePath) {
        const parser = new DOMParser(); const doc = parser.parseFromString(html, 'text/html');
        let rawName = "Unknown Chat"; const titleEl = doc.querySelector('title');
        if (titleEl) rawName = titleEl.textContent.trim();
        let threadName = cleanThreadName(rawName);
        const sections = doc.querySelectorAll('section._a6-g');
        if (sections.length === 0) return; 

        let dirPath = filePath ? filePath.split('/').slice(0, -1).join('/') + '/' : "";

        sections.forEach(sec => {
            const senderEl = sec.querySelector('h2'); const contentEl = sec.querySelector('._a6-p'); const footerEl = sec.querySelector('footer');
            const sender = senderEl ? senderEl.textContent.trim() : "Unknown";
            let dateStr = footerEl ? footerEl.textContent.trim() : "";
            dateStr = dateStr.replace(/in the mornin'/gi, 'AM').replace(/in the evenin'/gi, 'PM');

            let contentText = contentEl ? contentEl.cloneNode(true).textContent.replace(/\s+/g, ' ').trim() : "";

            sec.querySelectorAll('img').forEach(img => {
                const src = img.getAttribute('src'); if (src) resolveAndSaveMedia(src, dirPath, threadName, sender, dateStr, 'image');
            });
            sec.querySelectorAll('a').forEach(a => {
                const href = a.getAttribute('href'); const text = a.textContent.trim();
                if (href && (href.includes('files/') || text.includes('Download file'))) resolveAndSaveMedia(href, dirPath, threadName, sender, dateStr, 'file');
            });

            if (contentText) addMessage({ threadName, sender, content: contentText, dateStr, timestamp: parseTimestamp(dateStr), reactions: [] });
        });
    }

    function parseJSON(text, filePath) {
        let data; try { data = JSON.parse(text); } catch (e) { return; }
        if (!data.messages || !Array.isArray(data.messages)) return;

        let rawTitle = data.title || data.threadName || "";
        let parsedParticipants = [];
        if (Array.isArray(data.participants)) parsedParticipants = data.participants.map(p => typeof p === 'object' && p.name ? p.name : (typeof p === 'string' ? p : "")).filter(Boolean);
        let threadName = cleanThreadName(rawTitle, parsedParticipants);

        const pathParts = filePath.split('/'); const fileName = pathParts.pop(); const dirPath = pathParts.join('/') + '/'; const jsonFolderName = fileName.replace('.json', ''); 

        data.messages.forEach(msg => {
            if (msg.isUnsent) return; 
            const sender = msg.senderName || "Unknown"; const content = msg.text || "";
            let dateStr = ""; let timestamp = msg.timestamp || 0;
            if (timestamp) dateStr = new Date(timestamp).toLocaleString();
            const reactions = msg.reactions ? msg.reactions.map(r => r.reaction) : [];

            if (msg.media && msg.media.length > 0) {
                msg.media.forEach(m => {
                    if (m.uri) resolveAndSaveMedia(dirPath + `${jsonFolderName}/${m.uri.replace(/^\.\//, '')}`, dirPath, threadName, sender, dateStr, 'image');
                });
            }

            if (content || (msg.media && msg.media.length > 0)) addMessage({ threadName, sender, content: content || "[Media]", dateStr, timestamp, reactions });
        });
    }

    function resolveAndSaveMedia(path, baseDir, threadName, sender, dateStr, type) {
        let fileObj = state.fileRegistry[path];
        if (!fileObj) {
            const filename = path.split('/').pop();
            const matchKey = Object.keys(state.fileRegistry).find(key => key.endsWith(filename) && key.startsWith(baseDir));
            if (matchKey) fileObj = state.fileRegistry[matchKey];
        }
        if (fileObj) {
            const hash = `${threadName}_${sender}_${dateStr}_${fileObj.name}`;
            if (!state.mediaHashes.has(hash)) {
                state.mediaHashes.add(hash);
                state.media.push({ type, url: URL.createObjectURL(fileObj), filename: fileObj.name, threadName, sender, dateStr });
            }
        }
    }

    // --- Logic & Engine ---
    function recalculateStats() {
        state.chats = {};
        if (state.myNames.length === 0) state.myNames = ["Me"];
        let validMsgCount = 0;

        state.messages.forEach(msg => {
            const mappedThread = getMappedName(msg.threadName);
            const mappedSender = getMappedName(msg.sender);
            if (isExcluded(mappedThread, mappedSender)) return; 
            
            validMsgCount++;
            if (!state.chats[mappedThread]) state.chats[mappedThread] = { sent: 0, received: 0, total: 0, list: [], mediaCount: 0, participants: new Set(), firstMsg: Infinity, lastMsg: 0 };
            
            const chat = state.chats[mappedThread];
            chat.participants.add(mappedSender);
            
            const isMe = state.myNames.includes(mappedSender) || state.myNames.includes(msg.sender);
            if (isMe) chat.sent++; else chat.received++;
            chat.total++;
            
            if (msg.timestamp > 0) {
                if (msg.timestamp < chat.firstMsg) chat.firstMsg = msg.timestamp;
                if (msg.timestamp > chat.lastMsg) chat.lastMsg = msg.timestamp;
            }
            chat.list.push(msg); 
        });

        state.media.forEach(m => { 
            const mappedThread = getMappedName(m.threadName);
            const mappedSender = getMappedName(m.sender);
            if (isExcluded(mappedThread, mappedSender)) return;
            if (state.chats[mappedThread]) state.chats[mappedThread].mediaCount++; 
        });

        const myNamesLower = state.myNames.map(n => n.toLowerCase());
        for (const [name, chat] of Object.entries(state.chats)) {
            const otherParticipants = Array.from(chat.participants).filter(p => !myNamesLower.includes(p.toLowerCase()));
            chat.isGroup = otherParticipants.length > 1 || name.includes(',');
        }

        statTotalMsg.textContent = validMsgCount.toLocaleString();
        statChats.textContent = Object.keys(state.chats).length.toLocaleString();
    }

    function computeStatsForMessages(messagesArray) {
        if (!messagesArray || messagesArray.length === 0) return null;
        const sorted = [...messagesArray].filter(m => m.timestamp).sort((a,b) => a.timestamp - b.timestamp);
        if (sorted.length === 0) return null;

        let currentStreak = 0, maxStreak = 0, lastDate = null;
        const responseTimes = {}; const hours = new Array(24).fill(0); const dayCounts = new Set(); let previousMsg = null;
        
        sorted.forEach(msg => {
            const mappedSender = getMappedName(msg.sender);
            const dateObj = new Date(msg.timestamp);
            hours[dateObj.getHours()]++;
            
            const msgDate = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
            dayCounts.add(msgDate.getTime());
            
            if (lastDate) {
                const diffDays = Math.round((msgDate.getTime() - lastDate.getTime()) / (1000 * 3600 * 24));
                if (diffDays === 1) { currentStreak++; if (currentStreak > maxStreak) maxStreak = currentStreak; } 
                else if (diffDays > 1) { currentStreak = 1; }
            } else { currentStreak = 1; maxStreak = 1; }
            lastDate = msgDate;
            
            if (previousMsg) {
                const prevMappedSender = getMappedName(previousMsg.sender);
                if (prevMappedSender !== mappedSender) {
                    const diffMs = msg.timestamp - previousMsg.timestamp;
                    if (diffMs >= 0 && diffMs < 1000 * 60 * 60 * 24 * 3) { 
                        if (!responseTimes[mappedSender]) responseTimes[mappedSender] = { totalMs: 0, count: 0, fastest: Infinity, slowest: 0 };
                        responseTimes[mappedSender].totalMs += diffMs; responseTimes[mappedSender].count++;
                        if (diffMs < responseTimes[mappedSender].fastest) responseTimes[mappedSender].fastest = diffMs;
                        if (diffMs > responseTimes[mappedSender].slowest) responseTimes[mappedSender].slowest = diffMs;
                    }
                }
            }
            previousMsg = msg;
        });
        
        const maxHourVal = Math.max(...hours); const busiestHourIdx = hours.indexOf(maxHourVal);
        const formatHour = (h) => h === 0 ? "12 AM" : h < 12 ? `${h} AM` : h === 12 ? "12 PM" : `${h-12} PM`;

        const responseStats = Object.keys(responseTimes).map(sender => {
            const st = responseTimes[sender];
            return { sender, avgMs: st.count > 0 ? st.totalMs / st.count : 0, fastestMs: st.fastest === Infinity ? 0 : st.fastest, slowestMs: st.slowest, count: st.count };
        }).filter(s => s.count > 0).sort((a,b) => a.avgMs - b.avgMs);
        
        return { maxStreak, busiestHour: `${formatHour(busiestHourIdx)} - ${formatHour(busiestHourIdx+1)} (${maxHourVal} msgs)`, responseStats, totalDaysActive: dayCounts.size };
    }

    function buildStatsHTML(statsObj) {
        if (!statsObj) return `<div style="color:var(--text-muted)">Not enough timestamp data for stats.</div>`;
        let html = `<div class="stats-row"><div class="stats-card"><h3>🔥 Longest Streak</h3><div style="font-size:2.5rem; color:var(--success); font-weight:bold; text-align:center;">${statsObj.maxStreak} Days</div><div style="text-align:center; color:var(--text-muted); font-size:0.8rem;">Consecutive messaging days</div></div><div class="stats-card"><h3>🕒 Busiest Time</h3><div style="font-size:1.5rem; color:var(--accent-primary); font-weight:bold; text-align:center; margin-top:10px;">${statsObj.busiestHour.split('(')[0]}</div><div style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:5px;">(${statsObj.busiestHour.split('(')[1]}</div></div><div class="stats-card"><h3>🗓️ Total Active Days</h3><div style="font-size:2.5rem; color:var(--accent-secondary); font-weight:bold; text-align:center;">${statsObj.totalDaysActive}</div><div style="text-align:center; color:var(--text-muted); font-size:0.8rem;">Days with at least 1 message</div></div></div>`;

        if (statsObj.responseStats.length > 0) {
            html += `<div class="stats-card"><h3>⚡ Response Times</h3>`;
            statsObj.responseStats.forEach(s => {
                html += `<div style="margin-bottom: 1.5rem;"><div style="font-weight:bold; margin-bottom: 0.5rem; color:white;">${escapeHtml(s.sender)}</div><div class="stat-detail-row"><span>Average Response</span><span class="stat-highlight">${formatDuration(s.avgMs)}</span></div><div class="stat-detail-row"><span>Fastest Response</span><span class="stat-highlight">${formatDuration(s.fastestMs)}</span></div><div class="stat-detail-row"><span>Slowest Response</span><span class="stat-slow">${formatDuration(s.slowestMs)}</span></div></div>`;
            });
            html += `</div>`;
        } else {
             html += `<div class="stats-card"><h3>⚡ Response Times</h3><div style="color:var(--text-muted); font-size:0.9rem;">Not enough back-and-forth data within 3-day windows.</div></div>`;
        }
        return html;
    }

    // --- Views & UI ---
    function updateTopBarActions(viewName) {
        exportActions.innerHTML = '';
        exportActions.style.display = 'flex';
        
        if (['chat', 'chatMedia', 'chatStats'].includes(viewName)) {
            exportActions.innerHTML = `
                <button class="btn btn-danger" onclick="deleteCurrentChat()" title="Permanently removes this chat from your session">🗑️ Delete Chat</button>
                <button class="btn" onclick="exportTxt()">Export TXT</button>
                <button class="btn" onclick="window.print()">Print / PDF</button>
            `;
        } else if (viewName === 'directory') {
            exportActions.innerHTML = `
                <button class="btn btn-primary" onclick="window.print()">🖨️ Print Leaderboard</button>
            `;
        } else {
            exportActions.style.display = 'none';
        }
    }

    function switchView(viewName) {
        [viewSearch, viewChat, viewChatMedia, viewChatStats, viewGlobalMedia, viewGlobalStats, viewDirectory].forEach(el => el.classList.remove('active'));
        activeViewSubtitle.style.display = 'none';

        if (viewName === 'search') viewSearch.classList.add('active');
        else if (viewName === 'chat') viewChat.classList.add('active');
        else if (viewName === 'chatMedia') viewChatMedia.classList.add('active');
        else if (viewName === 'chatStats') viewChatStats.classList.add('active');
        else if (viewName === 'globalMedia') viewGlobalMedia.classList.add('active');
        else if (viewName === 'globalStats') viewGlobalStats.classList.add('active');
        else if (viewName === 'directory') viewDirectory.classList.add('active');
        
        updateTopBarActions(viewName);
        
        if (['chat', 'chatMedia', 'chatStats'].includes(viewName)) chatTabs.style.display = 'flex';
        else chatTabs.style.display = 'none';
    }

    function getFilteredChats(filterQuery) {
        let filteredChats = Object.entries(state.chats);
        if (state.sidebarFilter === 'direct') filteredChats = filteredChats.filter(([, data]) => !data.isGroup);
        else if (state.sidebarFilter === 'group') filteredChats = filteredChats.filter(([, data]) => data.isGroup);
        if (filterQuery) {
            const query = filterQuery.toLowerCase().trim();
            filteredChats = filteredChats.filter(([name]) => name.toLowerCase().includes(query));
        }
        filteredChats.sort(([,a], [,b]) => b.total - a.total);
        return filteredChats;
    }

    function renderContactList(filterQuery = "") {
        contactsList.innerHTML = '';
        const filteredChats = getFilteredChats(filterQuery);

        if (filteredChats.length === 0) { contactsList.innerHTML = '<div style="padding:1rem; text-align:center; color:gray; font-size:0.8rem;">No contacts found</div>'; return; }

        const fragment = document.createDocumentFragment();
        filteredChats.forEach(([name, data]) => {
            const div = document.createElement('div'); div.className = 'contact-item';
            if (state.activeChatName === name) div.classList.add('active');

            const groupBadge = (state.sidebarFilter === 'all' && data.isGroup) ? `<span style="font-size: 0.65rem; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; margin-left: 5px;">Group</span>` : '';

            div.innerHTML = `<div class="contact-name">${escapeHtml(name)}${groupBadge}</div><div class="contact-meta"><span class="badge-sent">↑${data.sent}</span> <span style="color:#555">|</span> <span class="badge-recv">↓${data.received}</span></div>`;
            div.onclick = () => openChat(name); fragment.appendChild(div);
        });
        contactsList.appendChild(fragment);
    }

    function renderDirectory(filterQuery = "") {
        directoryContainer.innerHTML = '';
        const filteredChats = getFilteredChats(filterQuery);

        if (filteredChats.length === 0) { directoryContainer.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:gray; width: 100%;">No chats match your filters.</div>'; return; }

        filteredChats.forEach(([name, data], index) => {
            const card = document.createElement('div'); card.className = 'directory-card';
            const groupBadge = data.isGroup ? `<div class="dir-card-badge">Group</div>` : '';
            
            let durationStr = "Unknown";
            if (data.firstMsg !== Infinity && data.lastMsg !== 0) {
                const totalDays = Math.max(1, Math.ceil((data.lastMsg - data.firstMsg) / (1000 * 60 * 60 * 24)));
                if (totalDays >= 365) {
                    const years = Math.floor(totalDays / 365); const days = totalDays % 365;
                    durationStr = `${years} Year${years > 1 ? 's' : ''}${days > 0 ? ` ${days} Day${days > 1 ? 's' : ''}` : ''}`;
                } else { durationStr = `${totalDays} Day${totalDays > 1 ? 's' : ''}`; }
            }

            card.innerHTML = `<div class="dir-card-header"><div class="dir-card-title" title="${escapeHtml(name)}"><span style="color:var(--text-muted); font-size:0.8rem; margin-right:5px;">#${index + 1}</span>${escapeHtml(name)}</div>${groupBadge}</div><div class="dir-card-stats"><span class="badge-sent">Sent: ${data.sent}</span><span class="badge-recv">Received: ${data.received}</span></div><div class="dir-card-stats" style="margin-top:5px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 6px;"><span style="color:var(--text-muted)">⏳ ${durationStr}</span><span style="color:var(--text-muted)">Total: ${data.total}</span></div>`;
            card.onclick = () => openChat(name); directoryContainer.appendChild(card);
        });
    }

    function switchChatTab(tab) {
        document.querySelectorAll('.chat-tabs .tab').forEach(t => t.classList.remove('active'));
        if (tab === 'messages') { document.querySelectorAll('.chat-tabs .tab')[0].classList.add('active'); switchView('chat'); setupSubtitle(); } 
        else if (tab === 'media') { document.querySelectorAll('.chat-tabs .tab')[1].classList.add('active'); switchView('chatMedia'); state.mediaLimit = 50; renderChatGallery(state.activeChatName); } 
        else if (tab === 'stats') { document.querySelectorAll('.chat-tabs .tab')[2].classList.add('active'); switchView('chatStats'); chatStatsContainer.innerHTML = buildStatsHTML(computeStatsForMessages(state.chats[state.activeChatName].list)); }
    }

    function setupSubtitle() {
        const data = state.chats[state.activeChatName];
        if (data && data.isGroup) { activeViewSubtitle.textContent = "Members: " + Array.from(data.participants).join(', '); activeViewSubtitle.style.display = 'block'; } 
        else { activeViewSubtitle.style.display = 'none'; }
    }

    function resetView() {
        switchView('search'); state.activeChatName = null; activeViewTitle.textContent = "Global Search Results";
        globalSearch.value = ""; contactFilter.value = ""; 
        renderResults(state.messages.filter(m => !isExcluded(getMappedName(m.threadName), getMappedName(m.sender))).slice(0, 50));
        renderContactList();
    }

    function openChat(chatName) {
        state.activeChatName = chatName;
        document.querySelectorAll('.contact-item').forEach(item => {
            if(item.querySelector('.contact-name').childNodes[0].nodeValue.trim() === chatName) item.classList.add('active'); else item.classList.remove('active');
        });
        switchChatTab('messages'); activeViewTitle.textContent = chatName; setupSubtitle();
        state.chatLimit = 50; renderChatMessages();
    }

    function renderChatMessages() {
        const data = state.chats[state.activeChatName]; if (!data) return;
        const slice = data.list.slice(-state.chatLimit); chatContainer.innerHTML = '';
        
        slice.forEach(msg => {
            const mappedSender = getMappedName(msg.sender);
            const isMe = state.myNames.includes(mappedSender) || state.myNames.includes(msg.sender);
            const div = document.createElement('div'); div.className = `chat-bubble ${isMe ? 'sent' : 'received'}`;
            const senderHtml = !isMe ? `<span class="bubble-sender">${escapeHtml(mappedSender)}</span>` : '';
            let reactionsHtml = '';
            if (msg.reactions && msg.reactions.length > 0) { reactionsHtml = `<div class="reaction-container">${msg.reactions.map(r => `<span class="reaction-badge">${r}</span>`).join('')}</div>`; }
            div.innerHTML = `${senderHtml}${escapeHtml(msg.content)}${reactionsHtml}<span class="bubble-date">${msg.dateStr}</span>`; chatContainer.appendChild(div);
        });
        setTimeout(() => chatContainer.scrollTop = chatContainer.scrollHeight, 50);
        chatLoadMore.style.display = (data.list.length > state.chatLimit) ? 'block' : 'none';
    }

    function loadMoreChat() { state.chatLimit += 50; renderChatMessages(); }

    function openDirectory() { switchView('directory'); activeViewTitle.textContent = "Chat Directory"; renderDirectory(contactFilter.value); }

    function openGlobalGallery() {
        switchView('globalMedia'); activeViewTitle.textContent = "All Media (Chronological)"; state.mediaLimit = 50;
        renderGallery(state.media.filter(m => !isExcluded(getMappedName(m.threadName), getMappedName(m.sender))), 'global');
    }

    function openGlobalStats() {
        switchView('globalStats'); activeViewTitle.textContent = "Global Insights & Stats";
        globalStatsContainer.innerHTML = buildStatsHTML(computeStatsForMessages(state.messages.filter(m => !isExcluded(getMappedName(m.threadName), getMappedName(m.sender)))));
    }

    function renderChatGallery(chatName) { renderGallery(state.media.filter(m => getMappedName(m.threadName) === chatName && !isExcluded(chatName, getMappedName(m.sender))), 'chat'); }

    function renderGallery(items, context) {
        const container = (context === 'global') ? globalGallery : chatGallery; const btn = (context === 'global') ? globalMediaLoadMore : chatMediaLoadMore;
        const visibleItems = items.slice(0, state.mediaLimit); container.innerHTML = '';
        if (visibleItems.length === 0) { container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:gray;">No media found.</div>'; btn.style.display = 'none'; return; }

        visibleItems.forEach(item => {
            const div = document.createElement('div'); div.className = 'gallery-item'; div.onclick = () => window.open(item.url, '_blank');
            if (item.type === 'image') { div.innerHTML = `<img src="${item.url}" class="gallery-img" loading="lazy"><div class="gallery-overlay">${escapeHtml(getMappedName(item.threadName))}<br>${item.dateStr}</div>`; } 
            else { div.innerHTML = `<div class="file-icon">📄</div><div class="file-name">${escapeHtml(item.filename)}</div><div class="gallery-overlay">Click to Download</div>`; }
            container.appendChild(div);
        });
        btn.style.display = (items.length > state.mediaLimit) ? 'block' : 'none';
    }

    function loadMoreMedia(context) { state.mediaLimit += 50; if (context === 'global') renderGallery(state.media.filter(m => !isExcluded(getMappedName(m.threadName), getMappedName(m.sender))), 'global'); else renderChatGallery(state.activeChatName); }

    function handleSearch(query) {
        query = query.toLowerCase().trim(); resultsList.innerHTML = '';
        const validMessages = state.messages.filter(m => !isExcluded(getMappedName(m.threadName), getMappedName(m.sender)));
        if (!query) { renderResults(validMessages.slice(0, 50)); return; }
        renderResults(validMessages.filter(m => m.content.toLowerCase().includes(query) || getMappedName(m.sender).toLowerCase().includes(query) || getMappedName(m.threadName).toLowerCase().includes(query)), query);
    }

    function renderResults(messages, highlight = null) {
        resultsList.innerHTML = '';
        if (messages.length === 0) { resultsList.innerHTML = '<div style="text-align:center; margin-top:20px; color:gray;">No results</div>'; return; }
        messages.slice(0, 100).forEach(msg => {
            const mSender = getMappedName(msg.sender); const mThread = getMappedName(msg.threadName);
            const div = document.createElement('div'); div.className = 'result-item';
            let contentHtml = escapeHtml(msg.content);
            if (highlight) contentHtml = contentHtml.replace(new RegExp(`(${escapeRegExp(highlight)})`, 'gi'), '<span class="highlight">$1</span>');
            div.innerHTML = `<div class="result-meta"><span style="color:var(--accent-primary); font-weight:bold;">${escapeHtml(mSender)}</span><span>•</span><span>${escapeHtml(mThread)}</span></div><div>${contentHtml}</div>`;
            div.onclick = () => openChat(mThread); resultsList.appendChild(div);
        });
        if (messages.length > 100) {
            const more = document.createElement('div'); more.style.textAlign = 'center'; more.style.padding = '10px'; more.style.color = 'gray'; more.textContent = `...and ${messages.length - 100} more results`; resultsList.appendChild(more);
        }
    }

    // --- Export Logic ---
    function exportTxt() {
        if (!state.activeChatName || !state.chats[state.activeChatName]) return;
        const chat = state.chats[state.activeChatName];
        const lines = [`CHAT HISTORY: ${state.activeChatName}`, `Exported on: ${new Date().toLocaleString()}`, `Total Messages: ${chat.total}\n`, "--------------------------------------------------\n"];
        [...chat.list].reverse().forEach(msg => {
            const mappedSender = getMappedName(msg.sender); const isMe = state.myNames.includes(mappedSender) || state.myNames.includes(msg.sender);
            lines.push(`[${msg.dateStr}] ${isMe ? "ME" : mappedSender}:`);
            if (msg.reactions && msg.reactions.length > 0) lines.push(`Reactions: ${msg.reactions.join(', ')}`);
            lines.push(msg.content); lines.push("");
        });
        const url = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'text/plain' }));
        const a = document.createElement('a'); a.href = url; a.download = `Chat_${state.activeChatName.replace(/[^a-z0-9]/gi, '_')}.txt`; a.click(); URL.revokeObjectURL(url);
    }

    async function exportAllChats() {
        if (typeof JSZip === 'undefined') { alert("JSZip library not loaded. Please check your internet connection."); return; }
        if (!confirm("This will generate a ZIP file containing all your chats as text files. It may take a moment. Continue?")) return;
        const zip = new JSZip(); const folder = zip.folder("All_Chats");
        for (const [name, data] of Object.entries(state.chats)) {
            const lines = [`CHAT HISTORY: ${name}`, `Total Messages: ${data.total}\n`, "--------------------------------------------------\n"];
            [...data.list].reverse().forEach(msg => {
                const mappedSender = getMappedName(msg.sender);
                lines.push(`[${msg.dateStr}] ${state.myNames.includes(mappedSender) || state.myNames.includes(msg.sender) ? "ME" : mappedSender}:`);
                lines.push(msg.content); lines.push("");
            });
            folder.file(name.replace(/[^a-z0-9]/gi, '_') + '.txt', lines.join('\n'));
        }
        overlay.classList.remove('hidden'); log.textContent = "Generating ZIP file... Please wait.";
        try { saveAs(await zip.generateAsync({ type: "blob" }), "Chat_Data_Export.zip"); log.textContent = "Download started!"; } 
        catch (err) { console.error(err); alert("Error generating ZIP file."); } 
        finally { setTimeout(() => overlay.classList.add('hidden'), 1000); }
    }

    function escapeHtml(t) { return String(t).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#039;'}[m])); }
    function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
</script>
</body>
</html>
